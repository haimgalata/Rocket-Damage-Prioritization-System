# Render Blueprint — PrioritAI backend (Docker) + static Vite frontend.
# Deploy: Dashboard → Blueprints → New Blueprint Instance (select repo), or attach this file when creating services.
# Docs: https://render.com/docs/blueprint-spec
#
# After first deploy, set secret env vars in the Render Dashboard (Blueprint sync: false placeholders below).
#
# Frontend: set VITE_API_URL to your live backend HTTPS origin (e.g. https://prioritai-backend.onrender.com),
# no trailing slash. Required at build time so the browser bundle calls the correct API.

services:
  - type: web
    name: prioritai-backend
    runtime: docker
    rootDir: server
    dockerfilePath: ./server/Dockerfile
    dockerContext: ./server
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      # Example: https://prioritai-ml-973722445460.europe-west1.run.app (set value in Dashboard)
      - key: ML_SERVICE_URL
        sync: false
      - key: ML_SERVICE_API_KEY
        sync: false

  - type: web
    name: prioritai-frontend
    runtime: static
    rootDir: client
    buildCommand: npm ci && npm run build
    staticPublishPath: ./client/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
