# Render Blueprint — PrioritAI backend (Docker) + static Vite frontend.
# Deploy: Dashboard → Blueprints → New Blueprint Instance (select repo), or attach this file when creating services.
# Docs: https://render.com/docs/blueprint-spec
#
# After first deploy, set secret env vars in the Render Dashboard (Blueprint sync: false placeholders below).
#
# Frontend: Node 20+ required (Tailwind v4 native bindings, Vite 8, react-router 7). Set NODE_VERSION in Dashboard if not using Blueprint.
# Set VITE_API_URL to your live backend HTTPS origin (e.g. https://prioritai-backend.onrender.com),
# no trailing slash. Required at build time so the browser bundle calls the correct API; rebuild static site after changing.
#
# Backend CORS: production static origin is baked into code; optional CORS_ORIGINS adds extra origins (comma-separated, no spaces in values).

services:
  - type: web
    name: prioritai-backend
    runtime: docker
    rootDir: server
    dockerfilePath: ./server/Dockerfile
    dockerContext: ./server
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      # Example: https://your-ml-service.<region>.run.app (set value in Dashboard)
      - key: ML_SERVICE_URL
        sync: false
      - key: ML_SERVICE_API_KEY
        sync: false
      # Optional comma-separated extra origins (e.g. preview deploys). Production static origin is in server/src/main.py.
      - key: CORS_ORIGINS
        sync: false

  - type: web
    name: prioritai-frontend
    runtime: static
    rootDir: client
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: VITE_API_URL
        sync: false
