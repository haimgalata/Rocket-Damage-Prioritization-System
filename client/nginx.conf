server {
    listen 80;
    server_name _;

    # Serve the compiled React SPA from the Vite build output directory.
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — any path that isn't a real file is served as index.html
    # so React Router can handle client-side navigation.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse-proxy all /api/* requests to the FastAPI backend container.
    location /api/ {
        proxy_pass         http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Allow large image uploads (up to 50 MB).
        client_max_body_size 50M;
    }

    # Proxy uploaded images served by the backend static files handler.
    location /uploads/ {
        proxy_pass         http://backend:8000/uploads/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_cache_valid  200 7d;
        expires            7d;
        add_header         Cache-Control "public";
    }

    # Security headers
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header X-XSS-Protection      "1; mode=block" always;
}