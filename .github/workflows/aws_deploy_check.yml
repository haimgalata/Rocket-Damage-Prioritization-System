name: AWS Credentials & Backend Lint Check

# Runs on every push to Linoy AND on pull requests targeting main,
# so problems are caught before a merge.
on:
  push:
    branches:
      - Linoy
  pull_request:
    branches:
      - main

jobs:
  aws-check:
    name: Verify AWS credentials
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Verify identity (confirms credentials are valid)
        run: aws sts get-caller-identity

  backend-lint:
    name: Python syntax & import check (server/)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: server/requirements.txt

      # Install only the lightweight packages needed for import checks.
      # Heavy dependencies (tensorflow, geopandas, osmnx) are mocked out below
      # so the CI step stays fast (< 60 s) without sacrificing coverage.
      - name: Install runtime dependencies
        run: |
          pip install --no-cache-dir \
            fastapi uvicorn[standard] python-multipart \
            sqlalchemy psycopg2-binary \
            PyJWT python-dotenv \
            pydantic

      - name: Check Python syntax across the whole server package
        run: python -m py_compile $(find server/src -name "*.py" | tr '\n' ' ')

      - name: Verify FastAPI app is importable (mocking heavy deps)
        env:
          # Prevent python-dotenv from failing when .env is absent in CI
          APP_ENV: ci
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          GROQ_API_KEY: ci-placeholder
        run: |
          python - <<'EOF'
          import sys, types

          # Stub every heavy dependency that would otherwise fail to import
          for mod in [
              "tensorflow", "tensorflow.keras", "tensorflow.keras.models",
              "groq",
              "geopandas", "osmnx", "shapely", "shapely.geometry",
              "pyproj", "pyogrio", "networkx",
              "numpy", "pandas", "openpyxl",
          ]:
              sys.modules.setdefault(mod, types.ModuleType(mod))

          # Confirm the application module itself loads without errors
          import importlib
          importlib.import_module("server.src.main")
          print("server.src.main imported successfully")
          EOF
