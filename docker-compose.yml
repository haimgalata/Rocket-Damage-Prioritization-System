services:

  postgres:
    image: postgres:16-alpine
    container_name: prioritai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: prioritai
      POSTGRES_PASSWORD: prioritai
      POSTGRES_DB: prioritai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prioritai -d prioritai"]
      interval: 5s
      timeout: 5s
      retries: 5

  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: prioritai-ml
    restart: unless-stopped
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 120s

  backend:
    # Build context must be ./server so Dockerfile COPY requirements.txt / COPY . ./server match [server/Dockerfile](server/Dockerfile).
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: prioritai-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      # Use in-cluster ML container; overrides ML_SERVICE_URL from .env for Compose-only setups.
      - ML_SERVICE_URL=http://ml-service:8080
    depends_on:
      postgres:
        condition: service_healthy
      ml-service:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
      - ./server/cache:/app/server/cache
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: prioritai-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", 'http://localhost:80']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  postgres_data:
